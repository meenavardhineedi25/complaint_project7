<!DOCTYPE html>
<html>
<head>
    <title>Complaint Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-custom { border-radius: 50px; padding: 10px 25px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="/">Complaint Portal</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="{% url 'file' %}" class="btn btn-light btn-custom me-2"><i class="fa fa-plus"></i> Submit</a></li>
        <li class="nav-item"><a href="{% url 'track' %}" class="btn btn-warning btn-custom me-2"><i class="fa fa-search"></i> Track</a></li>
        <li class="nav-item"><a href="{% url 'dashboard' %}" class="btn btn-success btn-custom me-2"><i class="fa fa-dashboard"></i> Dashboard</a></li>
        <li class="nav-item"><a href="{% url 'officer_login' %}" class="btn btn-dark btn-custom"><i class="fa fa-user-shield"></i> Officer</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
