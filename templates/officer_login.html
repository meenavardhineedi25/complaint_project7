{% extends 'base.html' %}
{% block content %}

<div class="card p-4 shadow-sm mx-auto" style="max-width:400px;">
<h3 class="text-center text-dark mb-4"><i class="fa fa-user-shield"></i> Officer Login</h3>

{% if error %}
<p class="text-danger text-center">{{error}}</p>
{% endif %}

<form method="post">{% csrf_token %}
<input class="form-control mb-3" name="username" placeholder="Username" required>
<input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
<button class="btn btn-dark btn-custom w-100"><i class="fa fa-sign-in-alt"></i> Login</button>
</form>
</div>

{% endblock %}
